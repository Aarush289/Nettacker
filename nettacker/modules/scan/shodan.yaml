info:
  name: shodan_host_lookup
  author: Aarush
  severity: info
  description: Query Shodan API to gather host information for a target IP
  reference:
    - https://developer.shodan.io/api
  profiles:
    - scan
    - osint
    - shodan

payloads:
  - library: http
    steps:
      - method: get
        timeout: 10
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: false
        ssl: true
        url:
          nettacker_fuzzer:
            input_format: "https://api.shodan.io/shodan/host/{target}?key={shodan_key}"
            prefix: ""
            suffix: ""
            interceptors: []
            data:
              
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "^200$"
              reverse: false
            content:
              regex: "\"ip_str\":"
              reverse: false
          log: "Shodan data found for {target}"